name: TM02W2 static Lua tests

on:
  push:
    branches:
      - feature/tm02w2-red-source-cost-selection
      - feature/tm02w2-red-task-execution
      - feature/tm02w2f-red-initial-network-fill
  pull_request:

jobs:
  planner-static-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Run TM02W2 planner harness
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2-static.lua "$GITHUB_WORKSPACE"

  execution-static-harness:
    if: ${{ hashFiles('mission/tests/tm02-red-network/tools/test-tm02w2e-static.lua') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Check TM02W2E navigation and watchdog syntax
        run: |
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2e-bootstrap-menu.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2e-moose-navigation-v4.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2e-progress-watchdog-v5.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2e-combat-events-v3.lua
      - name: Run TM02W2E route-progress watchdog harness
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2e-watchdog-static.lua "$GITHUB_WORKSPACE"
      - name: Run TM02W2E execution harness
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2e-static.lua "$GITHUB_WORKSPACE"

  initial-fill-static-harness:
    if: ${{ hashFiles('mission/tests/tm02-red-network/config-tm02w2f.lua') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Check TM02W2F source syntax
        run: |
          luac5.1 -p mission/tests/tm02-red-network/config-tm02w2f.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-initial-fill-planner.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-bootstrap-menu.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-launch-spread-adapter.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-commander-scheduler.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-route-reassignment-watchdog.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-transit-representation.lua
      - name: Run TM02W2F planner contract harness
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2f-static.lua "$GITHUB_WORKSPACE"
      - name: Run TM02W2F commander scheduler harness
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2f-scheduler-static.lua "$GITHUB_WORKSPACE"
      - name: Build TM02W2F DCS bundle
        shell: pwsh
        run: ./tools/build-tm02w2f-bundle.ps1
      - name: Check generated TM02W2F bundle syntax
        run: luac5.1 -p mission/tests/tm02-red-network/dist/TM02W2F.lua
