name: Fix towns marker script

on:
  push:
    branches:
      - agent/towns-discovery

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/towns-discovery
          fetch-depth: 0

      - name: Fix Lua syntax
        shell: python
        run: |
          from pathlib import Path

          path = Path("mission/tests/towns-discovery/dist/OMW_TOWNS_ALL_MARKERS.lua")
          text = path.read_text(encoding="utf-8")
          old = '''  local summary = string.format(\n    "TOWNS-Marker fertig: %d von %d erstellt, %d Fehler.",\n    MODULE.created, total, MODULE.failed\n  log(summary)'''
          new = '''  local summary = string.format(\n    "TOWNS-Marker fertig: %d von %d erstellt, %d Fehler.",\n    MODULE.created, total, MODULE.failed\n  )\n  log(summary)'''

          if old not in text:
              raise SystemExit("Expected broken Lua block was not found")

          path.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

      - name: Commit fix
        shell: bash
        run: |
          rm -f .github/workflows/fix-towns-markers.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mission/tests/towns-discovery/dist/OMW_TOWNS_ALL_MARKERS.lua .github/workflows/fix-towns-markers.yml
          git commit -m "Fix towns marker script syntax"
          git push origin HEAD:agent/towns-discovery
