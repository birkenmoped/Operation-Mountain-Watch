name: Add settlement zones test

on:
  push:
    branches:
      - agent/towns-discovery

permissions:
  contents: write

jobs:
  add-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/towns-discovery
          fetch-depth: 0

      - name: Write validated test files
        shell: python
        run: |
          from pathlib import Path
          import base64
          import gzip

          files = {
              "mission/tests/settlement-zones/dist/OMW_SETTLEMENT_ZONES_TEST.lua": "",
              "mission/tests/settlement-zones/README.md": "",
          }

          for relative_path, encoded in files.items():
              path = Path(relative_path)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(gzip.decompress(base64.b64decode(encoded)))

      - name: Commit test implementation
        shell: bash
        run: |
          rm -f .github/workflows/add-settlement-zones-test.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mission/tests/settlement-zones .github/workflows/add-settlement-zones-test.yml
          git commit -m "Add manual settlement zone behavior test"
          git push origin HEAD:agent/towns-discovery
