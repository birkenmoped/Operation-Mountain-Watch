name: TM02W2 static Lua tests

on:
  push:
    branches:
      - feature/tm02w2-red-source-cost-selection
      - feature/tm02w2-red-task-execution
      - feature/tm02w2f-red-initial-network-fill
  pull_request:

jobs:
  planner-static-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Run TM02W2 planner harness
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2-static.lua "$GITHUB_WORKSPACE"

  execution-static-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Check TM02W2E navigation and watchdog syntax
        if: ${{ hashFiles('mission/tests/tm02-red-network/tools/test-tm02w2e-static.lua') != '' }}
        run: |
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2e-bootstrap-menu.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2e-moose-navigation-v4.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2e-progress-watchdog-v5.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2e-combat-events-v3.lua
      - name: Run TM02W2E route-progress watchdog harness
        if: ${{ hashFiles('mission/tests/tm02-red-network/tools/test-tm02w2e-static.lua') != '' }}
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2e-watchdog-static.lua "$GITHUB_WORKSPACE"
      - name: Run TM02W2E execution harness
        if: ${{ hashFiles('mission/tests/tm02-red-network/tools/test-tm02w2e-static.lua') != '' }}
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2e-static.lua "$GITHUB_WORKSPACE"

  initial-fill-static-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Check TM02W2F source syntax
        run: |
          luac5.1 -p mission/tests/tm02-red-network/config-tm02w2f.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-initial-fill-planner.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-bootstrap-menu.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-direct-offroad-navigation.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-commander-scheduler.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-transit-representation-v9.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2f-progress-watchdog-v9.lua
          luac5.1 -p mission/tests/tm02-red-network/src/tm02w2e-combat-events-v3.lua
          cat \
            mission/tests/tm02-red-network/tools/test-tm02w2f-watchdog-v9-part1.lua \
            mission/tests/tm02-red-network/tools/test-tm02w2f-watchdog-v9-part2.lua \
            > /tmp/test-tm02w2f-watchdog-v9.lua
          luac5.1 -p /tmp/test-tm02w2f-watchdog-v9.lua
      - name: Run TM02W2F planner and ASTAR contract harness
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2f-v9-static.lua "$GITHUB_WORKSPACE"
      - name: Run TM02W2F commander canary harness
        run: lua5.1 mission/tests/tm02-red-network/tools/test-tm02w2f-scheduler-static.lua "$GITHUB_WORKSPACE"
      - name: Run TM02W2F watchdog 9 behavior harness
        run: lua5.1 /tmp/test-tm02w2f-watchdog-v9.lua "$GITHUB_WORKSPACE"
      - name: Build TM02W2F DCS bundle
        shell: pwsh
        run: ./tools/build-tm02w2f-bundle.ps1
      - name: Check generated TM02W2F bundle syntax
        run: luac5.1 -p mission/tests/tm02-red-network/dist/TM02W2F.lua
      - name: Verify exposure-guarded watchdog 9 bundle contract
        run: |
          BUNDLE=mission/tests/tm02-red-network/dist/TM02W2F.lua
          ! grep -q "TM02W2EMooseNavigationV4" "$BUNDLE"
          ! grep -q "RouteReassignmentWatchdog" "$BUNDLE"
          ! grep -q "LaunchSpreadAdapter" "$BUNDLE"
          ! grep -q "convertTaskForRecovery" "$BUNDLE"
          ! grep -q "NAVIGATION_BLOCKED" "$BUNDLE"
          ! grep -q "local remaining = projection.totalMeters - projection.alongMeters" "$BUNDLE"
          grep -q "local remaining = distance2D(group:GetCoordinate(), context.target)" "$BUNDLE"
          grep -q "TM02W2F-red-direct-offroad-watchdog-9" "$BUNDLE"
          grep -q "DIRECT_OFFROAD_WITH_EXPOSURE_GUARDED_RECOVERY" "$BUNDLE"
          grep -q "SAME_GROUP_ROUTE_REFRESH" "$BUNDLE"
          grep -q "SAME_GROUP_LOCAL_DETOUR" "$BUNDLE"
          grep -q "PROXY_RELOCATION_" "$BUNDLE"
          grep -q "FULL_GROUP_RELOCATION_" "$BUNDLE"
          grep -q "RECOVERY_DEFERRED_EXPOSED" "$BUNDLE"
          grep -q "RECOVERY_EXHAUSTED_WAIT" "$BUNDLE"
          grep -q "road_recovery_unavailable" "$BUNDLE"
          grep -q "recovery_credit_granted" "$BUNDLE"
          grep -q "expanded_group_losses_recorded" "$BUNDLE"
          grep -q "automaticRecoveryInterface = false" "$BUNDLE"
      - name: Upload TM02W2F watchdog 9 test bundle
        uses: actions/upload-artifact@v4
        with:
          name: TM02W2F-watchdog-9
          path: mission/tests/tm02-red-network/dist/TM02W2F.lua
          if-no-files-found: error
